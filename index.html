<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Css Gradient</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body >
  <section class="section-1">
<label for="" id="lbl-1">Linear gradient</label>
<div id="lg1">Normal Colors </div>
 <div id="lg2">Ranbow Colors </div>
 <div id="lg3"> To left Top & Color </div>
 <div id="lg4">120Degre & Multiple Colors</div>
  </section>
<section class="section-2">
  <label for=""  id="lbl-2">Radial Gradient</label>
  <div id="Rl1"><h1>Normal colors </h1></div>
<div id="Rl2"><h1>circle & colors</h1></div>
<div id="Rl3"><h1>ellipse & colors</h1></div>
<div id="Rl4"><h1>multiple colors</h1></div>

<section class="box-shadow">
  <label for="" id="lbl-3">Box Shadow</label>
<div id="shadow-1"> Colors</div>
<div id="shadow-2"> Colors + Blur </div>
<div id="shadow-3"> 20 Blur + Color</div>
<div id="shadow-4">20 Blur + Color + Spread</div>
<div id="shadow-5"> 2 inset diff colors + blur</div>
<div id="shadow-6"> 1 inset + blur + <br>color</div>

</section>
<section class="drop-shadow">
<label for="" id="lbl-4">  Drop Shadow</label>
<div id="D-shadow-1">Colors</div>
<div id="D-shadow-2"> Colors + Blur </div>
<div id="D-shadow-3">20 Blur + Color</div>
<div id="D-shadow-4"></div>
<div id="D-shadow-5"></div>
<div id="D-shadow-6"></div>
</section>
</section>
</body>
</html>
